  <main class="quiz-wrap">

    <!-- 起始屏 -->
    <section class="quiz-hero quiz-screen" id="screen-start">
      <div class="quiz-hero__kicker">WHICH ANCIENT SOUL ARE YOU</div>
      <h1 class="quiz-hero__title">看你更像哪位古人</h1>
      <div class="quiz-hero__sub">九问测出你的"古人人格"</div>

      <button class="quiz-btn quiz-btn--solid" id="quiz-start">开始测试</button>

      <div class="quiz-progress">
